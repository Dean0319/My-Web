<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>历史街区成果展示模板（3D + 分析 + 介绍）</title>
    <meta name="color-scheme" content="light" />
  </head>
  <body>
    <header class="topbar">
      <div class="title">
        <div class="h1">历史街区成果展示模板</div>
        <div class="sub">模型 · 分析（可扩展） · 细节介绍（点击模型部件）</div>
      </div>
      <div class="actions">
        <label class="btn">
          导入 .glb
          <input id="file" type="file" accept=".glb,model/gltf-binary" />
        </label>
        <button id="load-demo" class="btn" type="button">加载示例：简易建筑</button>
        <button id="load-url" class="btn" type="button" title="从 public/models 加载">加载 /models/demo.glb</button>
        <button id="reset" class="btn" type="button">重置</button>
      </div>
    </header>

    <main class="layout">
      <section class="viewer" aria-label="3D 模型展示区">
        <canvas id="gl"></canvas>
        <div class="viewer-hint" aria-hidden="true">右键旋转 · 中键平移 · 滚轮缩放 · 左键点击部件</div>
        <div id="hud" class="hud" aria-live="polite"></div>
      </section>

      <!-- 右侧面板：类似 BIM 系统的“侧边栏”形态。
           顶部用 Tabs 切换：分析 / 介绍。
           这样符合“分析在右边”，并且右侧区域可持续扩展新模块。 -->
      <aside class="sidebar" aria-label="右侧面板">
        <section class="card sidebar-card" aria-label="分析与介绍">
          <div class="card-h">
            <div class="tablist" role="tablist" id="side-tabs" aria-label="侧边栏标签">
              <button class="tab" type="button" role="tab" data-pane="analysis" aria-selected="true">分析</button>
              <button class="tab" type="button" role="tab" data-pane="detail" aria-selected="false">介绍</button>
            </div>
          </div>

          <div class="card-b sidebar-body">
            <div id="analysis-root" class="sidebar-pane" data-pane="analysis"></div>
            <div id="detail-root" class="sidebar-pane" data-pane="detail" hidden></div>
          </div>
        </section>
      </aside>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
